{% extends 'layout.html' %}

{% block title %} {{title}} {% endblock %}

{% block container %}

    <h1 class="text-center">{{ title }}</h1>

    <div class="row mt-4 p-4">
        <div class="row mb-2">
            <div class="col-1 text-center">ID</div>
            <div class="col text-center">EMAIL</div>
            <div class="col text-center">ACCOUNT</div>
            <div class="col text-center">PASSWORD</div>
            <div class="col-1 text-center">DELETE</div>
            <div class="col-1 text-center">EDITE</div>
        </div>

        {% for item in data %}
            {% if item %}
                <div class="row">
                    <div class="col-1 border text-center p-1">{{ item.id }}</div>
                    <div class="col border text-center p-1">{{ item.email }}</div>
                    <div class="col border text-center p-1">{{ item.account }}</div>
                    <div class="col border p-3 text-break">{{ item.password }}</div>
                    <div class="col-1 border p-3">
                        <form action="/delete-record//{{item.id}}" method="post">
                            <button class="btn btn-danger" type="submit">DELETE</button>
                        </form>
                    </div>
                    <div class="col-1 border p-3">
                       <a href="/edite-record/{{item.id}}" class="btn btn-primary">EDITE</a>
                    </div>
                </div>
            {% endif %}
		{% endfor %}

    </div>

{% endblock %}
