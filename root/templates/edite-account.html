{% extends 'layout.html' %}

{% block title %} {{title}} {% endblock %}

{% block container %}

    <h1 class="text-center"> {{ titlt }} </h1>
    <div class="row m-4">
        <div class="nawBar">
            {% if current_user.is_authenticated %}
               <!-- Button trigger change password modal -->
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                  Change Password
                </button>
            {% endif %}
        </div>
    </div>

    <!-- Update account details -->
    <div class="row p-4 m-4">
        <form action="{{ url_for('home.account', id=user.id) }}" method="post">
            <div class="row mb-4">
                <div class="col-4">
                    <input id="user-email" class="form-control" type="email" placeholder="Email" name="email" value="{{ user.email}}">
                </div>
            </div>
            <button class="btn btn-primary col-1 mt-4" type="submit">Update</button>
        </form>
    </div>


    <!-- Change Password Modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="changePasswordLabel">Change Password</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row p-4 m-4">
                        <form action="#" method="post">
                            <div class="row mb-4">
                                <div class="col">
                                    <input id="user-password" class="form-control" type="password" placeholder="Old Password" name="passwordOld" value="" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col">
                                    <input id="user-password-new" class="form-control" type="password" placeholder="New Password" name="passwordNew" value="" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col">
                                    <input id="user-password-confirm" class="form-control" type="password" placeholder="Confirm Password" name="passwordConfirm" value="" required>
                                </div>
                            </div>
                            <button class="btn btn-primary col-6 mt-4" type="submit">Change Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
